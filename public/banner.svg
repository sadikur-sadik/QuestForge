<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%" height="100%">
  <defs>
    <!-- Imports Orbitron and Inter fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=Orbitron:wght@700;900&amp;display=swap');

      .bg-rect {
        fill: #09090b;
      }
      
      .font-title {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 900;
      }

      .font-body {
        font-family: 'Inter', -apple-system, sans-serif;
      }

      /* Animations */
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-12px) rotate(1.5deg); }
      }

      @keyframes float-medium {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(-1deg); }
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }

      @keyframes text-shimmer {
        0% { fill: #ffffff; filter: drop-shadow(0 0 4px #6d28d9); }
        50% { fill: #06b6d4; filter: drop-shadow(0 0 12px #06b6d4); }
        100% { fill: #ffffff; filter: drop-shadow(0 0 4px #6d28d9); }
      }

      @keyframes spark-rise {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        10% { opacity: 0.9; }
        90% { opacity: 0.3; }
        100% { transform: translateY(-150px) scale(0.3); opacity: 0; }
      }

      @keyframes star-twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      @keyframes grid-drift {
        0% { transform: translateY(0); }
        100% { transform: translateY(30px); }
      }

      /* Classes */
      .anim-float-sword {
        animation: float-slow 6s ease-in-out infinite;
        transform-origin: 900px 200px;
      }

      .anim-float-controller {
        animation: float-medium 5s ease-in-out infinite;
        transform-origin: 750px 280px;
      }

      .anim-pulse {
        animation: pulse-glow 4s ease-in-out infinite;
      }

      .anim-text {
        animation: text-shimmer 8s ease-in-out infinite;
      }

      .spark {
        animation: spark-rise 3.5s ease-in infinite;
        transform-origin: center bottom;
      }

      .star {
        animation: star-twinkle 3s ease-in-out infinite;
      }

      .grid-lines {
        animation: grid-drift 4s linear infinite;
      }

      /* Slide Animations for Text */
      .slide-in-right {
        opacity: 0;
        transform: translateX(-50px);
        animation: slide-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .slide-in-right-delay {
        opacity: 0;
        transform: translateX(-50px);
        animation: slide-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      }

      .slide-in-right-delay2 {
        opacity: 0;
        transform: translateX(-50px);
        animation: slide-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
      }

      @keyframes slide-in {
        to { opacity: 1; transform: translateX(0); }
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#0f0720" />
      <stop offset="100%" stop-color="#020813" />
    </linearGradient>

    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>

    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <linearGradient id="sword-blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0" />
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.4" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="25" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.02
        0 0 0 0 0.71
        0 0 0 0 0.83
        0 0 0 0 0.8 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip Paths -->
    <clipPath id="banner-clip">
      <rect width="1200" height="450" rx="24" />
    </clipPath>
  </defs>

  <!-- Banner Container -->
  <g clip-path="url(#banner-clip)">
    <!-- Base Background -->
    <rect width="1200" height="450" fill="url(#bg-grad)" />

    <!-- Ambient Glow Blobs -->
    <circle cx="200" cy="100" r="250" fill="#6d28d9" opacity="0.15" filter="url(#glow-heavy)" />
    <circle cx="1000" cy="350" r="300" fill="#06b6d4" opacity="0.12" filter="url(#glow-heavy)" />
    <circle cx="850" cy="150" r="200" fill="#ec4899" opacity="0.08" filter="url(#glow-heavy)" />

    <!-- Twinkling Starfield -->
    <g opacity="0.6">
      <circle cx="150" cy="80" r="1.5" fill="#fff" class="star" style="animation-delay: 0.2s;" />
      <circle cx="340" cy="120" r="2" fill="#fff" class="star" style="animation-delay: 1.5s;" />
      <circle cx="520" cy="70" r="1" fill="#fff" class="star" style="animation-delay: 0.8s;" />
      <circle cx="780" cy="90" r="2.5" fill="#06b6d4" class="star" style="animation-delay: 2.1s;" />
      <circle cx="950" cy="60" r="1.5" fill="#fff" class="star" style="animation-delay: 0.5s;" />
      <circle cx="1120" cy="140" r="2" fill="#a855f7" class="star" style="animation-delay: 1.8s;" />
      <circle cx="110" cy="300" r="1" fill="#fff" class="star" style="animation-delay: 2.7s;" />
      <circle cx="450" cy="380" r="2" fill="#fff" class="star" style="animation-delay: 1.1s;" />
      <circle cx="670" cy="340" r="1.5" fill="#06b6d4" class="star" style="animation-delay: 0.4s;" />
    </g>

    <!-- Perspective Cyber Grid -->
    <g opacity="0.6">
      <!-- Grid Background -->
      <path d="M 0,280 L 1200,280 L 1200,450 L 0,450 Z" fill="url(#grid-grad)" opacity="0.3" />
      
      <!-- Perspective Lines -->
      <line x1="600" y1="280" x2="-200" y2="450" stroke="#06b6d4" stroke-width="1" opacity="0.3" />
      <line x1="600" y1="280" x2="50" y2="450" stroke="#06b6d4" stroke-width="1.2" opacity="0.4" />
      <line x1="600" y1="280" x2="300" y2="450" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" />
      <line x1="600" y1="280" x2="550" y2="450" stroke="#06b6d4" stroke-width="1.8" opacity="0.6" stroke-dasharray="8 4" />
      <line x1="600" y1="280" x2="650" y2="450" stroke="#06b6d4" stroke-width="1.8" opacity="0.6" stroke-dasharray="8 4" />
      <line x1="600" y1="280" x2="900" y2="450" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" />
      <line x1="600" y1="280" x2="1150" y2="450" stroke="#06b6d4" stroke-width="1.2" opacity="0.4" />
      <line x1="600" y1="280" x2="1400" y2="450" stroke="#06b6d4" stroke-width="1" opacity="0.3" />
      
      <!-- Horizontal Lines with Drift -->
      <g class="grid-lines" stroke="#06b6d4" stroke-width="1" opacity="0.4">
        <line x1="0" y1="290" x2="1200" y2="290" />
        <line x1="0" y1="310" x2="1200" y2="310" opacity="0.5" />
        <line x1="0" y1="335" x2="1200" y2="335" opacity="0.6" />
        <line x1="0" y1="365" x2="1200" y2="365" opacity="0.7" />
        <line x1="0" y1="400" x2="1200" y2="400" opacity="0.8" />
        <line x1="0" y1="440" x2="1200" y2="440" opacity="0.9" />
      </g>
    </g>

    <!-- Scanline Laser Beam Effect -->
    <rect width="1200" height="2" fill="#06b6d4" opacity="0.15" filter="url(#glow-cyan)">
      <animate attributeName="y" values="-10; 460; -10" dur="8s" repeatCount="indefinite" />
    </rect>

    <!-- ── RIGHT SIDE: ARTWORK & GRAPHICS ── -->

    <!-- Cyber Portal / Runering Background -->
    <g transform="translate(850, 220)">
      <!-- Outer Pulsing Ring -->
      <circle cx="0" cy="0" r="140" fill="none" stroke="url(#primary-grad)" stroke-width="2" stroke-dasharray="10 30" opacity="0.5" class="anim-pulse">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite" />
      </circle>
      <!-- Middle Glowing Ring -->
      <circle cx="0" cy="0" r="120" fill="none" stroke="url(#secondary-grad)" stroke-width="1.5" stroke-dasharray="100 20 40 20" opacity="0.6" filter="url(#glow-light)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite" />
      </circle>
      <!-- Inner Portal Disk -->
      <circle cx="0" cy="0" r="95" fill="#000" opacity="0.8" stroke="#a855f7" stroke-width="1" />
      <circle cx="0" cy="0" r="95" fill="url(#primary-grad)" opacity="0.25" filter="url(#glow-heavy)" />
    </g>

    <!-- Rising Forge Sparks -->
    <g transform="translate(850, 320)" opacity="0.8">
      <circle cx="-40" cy="0" r="3" fill="#f59e0b" filter="url(#glow-light)" class="spark" style="animation-delay: 0.1s;" />
      <circle cx="-20" cy="-10" r="2.5" fill="#06b6d4" filter="url(#glow-light)" class="spark" style="animation-delay: 1.2s;" />
      <circle cx="0" cy="-5" r="4" fill="#ef4444" filter="url(#glow-light)" class="spark" style="animation-delay: 0.5s;" />
      <circle cx="20" cy="-15" r="3.5" fill="#f59e0b" filter="url(#glow-light)" class="spark" style="animation-delay: 2.2s;" />
      <circle cx="45" cy="0" r="2" fill="#a855f7" filter="url(#glow-light)" class="spark" style="animation-delay: 1.7s;" />
      <circle cx="-10" cy="-20" r="3" fill="#fff" filter="url(#glow-light)" class="spark" style="animation-delay: 0.9s;" />
      <circle cx="30" cy="-5" r="2.5" fill="#06b6d4" filter="url(#glow-light)" class="spark" style="animation-delay: 2.9s;" />
      <circle cx="-30" cy="-15" r="4.5" fill="#fbbf24" filter="url(#glow-light)" class="spark" style="animation-delay: 1.5s;" />
    </g>

    <!-- Glowing Controller Overlay -->
    <g class="anim-float-controller">
      <!-- Background Glow -->
      <rect x="690" y="220" width="130" height="90" rx="35" fill="#06b6d4" opacity="0.1" filter="url(#glow-heavy)" />
      
      <!-- Controller SVG Path -->
      <path d="M 715,230 
               C 700,230 690,245 690,265 
               C 690,290 710,310 725,310 
               C 732,310 740,302 750,295 
               C 760,295 770,295 780,295 
               C 790,302 798,310 805,310 
               C 820,310 840,290 840,265 
               C 840,245 830,230 815,230 
               Z" 
            fill="#1e1b4b" fill-opacity="0.9" stroke="url(#secondary-grad)" stroke-width="3" filter="url(#glow-light)" />
      
      <!-- Controller Details: D-Pad -->
      <path d="M 720,265 L 728,265 M 724,261 L 724,269" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
      
      <!-- Controller Details: Buttons -->
      <circle cx="795" cy="268" r="4.5" fill="#ec4899" />
      <circle cx="807" cy="260" r="4.5" fill="#3b82f6" />
      <circle cx="807" cy="276" r="4.5" fill="#10b981" />
      <circle cx="819" cy="268" r="4.5" fill="#f59e0b" />
      
      <!-- Thumbsticks -->
      <circle cx="743" cy="278" r="9" fill="#0f172a" stroke="#475569" stroke-width="2" />
      <circle cx="743" cy="278" r="4" fill="#06b6d4" />
      <circle cx="787" cy="278" r="9" fill="#0f172a" stroke="#475569" stroke-width="2" />
      <circle cx="787" cy="278" r="4" fill="#06b6d4" />
      
      <!-- Center Select/Start buttons -->
      <line x1="760" y1="262" x2="766" y2="262" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
      <line x1="772" y1="262" x2="778" y2="262" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Floating Cyber Sword / Quest Blade -->
    <g class="anim-float-sword">
      <!-- Background Blade Glow -->
      <line x1="835" y1="290" x2="945" y2="100" stroke="#a855f7" stroke-width="12" stroke-linecap="round" opacity="0.25" filter="url(#glow-heavy)" />
      
      <!-- Sword shadow/glow -->
      <path d="M 830,290 L 845,285 L 945,110 L 950,105 L 940,115 L 835,295 Z" fill="#6d28d9" opacity="0.3" filter="url(#glow-light)" />

      <!-- Sword Guard / Hilt -->
      <circle cx="820" cy="315" r="9" fill="url(#gold-grad)" stroke="#1e293b" stroke-width="1.5" />
      <rect x="822" y="292" width="10" height="20" rx="3" transform="rotate(-30 822 292)" fill="#1e1b4b" stroke="url(#gold-grad)" stroke-width="1.5" />
      <path d="M 815,285 L 850,265" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" filter="url(#glow-light)" />
      <circle cx="815" cy="285" r="3" fill="#fff" />
      <circle cx="850" cy="265" r="3" fill="#fff" />

      <!-- Blade Base (Cyan glowing core) -->
      <path d="M 839,275 L 940,100 L 942,102 L 841,277 Z" fill="#06b6d4" opacity="0.9" filter="url(#glow-cyan)" />
      <!-- Metal Blade Sides -->
      <path d="M 840,274 L 938,104 L 941,99 L 943,101 L 843,279 Z" fill="url(#sword-blade)" />
      
      <!-- Blade Center Runic Markings -->
      <line x1="855" y1="248" x2="910" y2="152" stroke="#fff" stroke-width="1.5" stroke-dasharray="5 3 2 3" opacity="0.9" filter="url(#glow-light)" />
    </g>

    <!-- Floating Geometric Cyber Runes -->
    <polygon points="980,180 990,195 980,210 970,195" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6" filter="url(#glow-light)" class="anim-pulse">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" cx="980" cy="195" dur="10s" repeatCount="indefinite" />
    </polygon>

    <!-- Star Symbol -->
    <path d="M 700,130 L 704,138 L 713,139 L 706,145 L 708,154 L 700,149 L 692,154 L 694,145 L 687,139 L 696,138 Z" fill="url(#gold-grad)" opacity="0.7" filter="url(#glow-light)">
      <animateTransform attributeName="transform" type="scale" values="1; 1.15; 1" keyTimes="0; 0.5; 1" dur="4s" repeatCount="indefinite" />
    </path>


    <!-- ── LEFT SIDE: TYPOGRAPHY & TEXT ── -->

    <!-- System Badge -->
    <g transform="translate(80, 110)" class="slide-in-right">
      <rect x="0" y="0" width="170" height="28" rx="14" fill="#6d28d9" fill-opacity="0.15" stroke="#a855f7" stroke-width="1" />
      <circle cx="14" cy="14" r="5" fill="#06b6d4" class="anim-pulse" />
      <text x="28" y="18" fill="#e2e8f0" font-family="'Inter', sans-serif" font-size="10" font-weight="800" letter-spacing="1.5">CATALOG SYSTEM v1.0</text>
    </g>

    <!-- Main Title: QUESTFORGE -->
    <g transform="translate(80, 195)" class="slide-in-right-delay">
      <!-- Glow Underlay -->
      <text x="0" y="0" class="font-title anim-text" font-size="72" letter-spacing="4" fill="#a855f7" opacity="0.9" filter="url(#glow-heavy)">QUESTFORGE</text>
      
      <!-- Crisp Foreground text -->
      <text x="0" y="0" class="font-title" font-size="72" letter-spacing="4" fill="#ffffff" filter="url(#glow-light)">QUESTFORGE</text>
      
      <!-- Linear bar below text -->
      <line x1="0" y1="18" x2="350" y2="18" stroke="url(#secondary-grad)" stroke-width="4" stroke-linecap="round" filter="url(#glow-cyan)" />
      <line x1="365" y1="18" x2="385" y2="18" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    </g>

    <!-- Subtitle: Forge Your Ultimate Game Catalog -->
    <g transform="translate(80, 265)" class="slide-in-right-delay2">
      <!-- Large description -->
      <text x="0" y="0" class="font-body" font-size="20" font-weight="600" fill="#e2e8f0" letter-spacing="0.5">
        Forge Your Ultimate Game Catalog
      </text>
      <text x="0" y="28" class="font-body" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="0.2" opacity="0.9">
        Track your quests, review your favorites, and build your digital archive.
      </text>
    </g>

    <!-- Action Tags/Badges -->
    <g transform="translate(80, 345)" class="slide-in-right-delay2">
      <!-- Action Badge 1: TRACK -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="90" height="32" rx="8" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5" />
        <text x="45" y="20" class="font-body" font-size="11" font-weight="800" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">TRACK</text>
      </g>
      
      <!-- Connector Arrow -->
      <path d="M 102,16 L 112,16 M 108,12 L 113,16 L 108,20" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Action Badge 2: SHARE -->
      <g transform="translate(125, 0)">
        <rect x="0" y="0" width="90" height="32" rx="8" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5" />
        <text x="45" y="20" class="font-body" font-size="11" font-weight="800" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">SHARE</text>
      </g>

      <!-- Connector Arrow -->
      <path d="M 227,16 L 237,16 M 233,12 L 238,16 L 233,20" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Action Badge 3: CONQUER -->
      <g transform="translate(250, 0)">
        <rect x="0" y="0" width="105" height="32" rx="8" fill="url(#primary-grad)" stroke="#a855f7" stroke-width="1" filter="url(#glow-light)" />
        <text x="52" y="20" class="font-body" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">CONQUER</text>
      </g>
    </g>

  </g>
</svg>
